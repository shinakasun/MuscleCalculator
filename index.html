<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>計算肌 v0.42</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    ::-webkit-scrollbar { display: none; }
    input[type="number"] { text-align: right; }
  </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans pb-20">

  <header class="bg-blue-600 text-white p-4 flex justify-between items-center sticky top-0 z-10 shadow-md">
    <h1 class="text-xl font-bold">計算肌 v0.42</h1>
    <button onclick="toggleModal('settingsModal')" class="bg-blue-700 hover:bg-blue-800 p-2 rounded text-sm">⚙️ 設定體態</button>
  </header>

  <main class="p-4 max-w-md mx-auto space-y-6">
    
    <section class="bg-white p-4 rounded-xl shadow-sm">
      <h2 class="text-lg font-bold mb-2 border-b pb-2">今日進度</h2>
      <div class="grid grid-cols-2 gap-4 text-sm">
        <div class="flex flex-col justify-between">
          <span class="text-gray-500 font-bold">熱量 (kcal)</span>
          <div class="text-3xl font-black text-gray-800" id="ui-tot-cal">0</div>
          <div class="mt-2" id="ui-rem-cal"></div>
        </div>
        <div class="flex flex-col justify-between">
          <span class="text-gray-500 font-bold">蛋白質 (g)</span>
          <div class="text-3xl font-black text-blue-600" id="ui-tot-pro">0</div>
          <div class="mt-2" id="ui-rem-pro"></div>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-4 text-sm mt-3 pt-3 border-t">
        <div><span class="text-gray-500">碳水: </span><span class="font-bold text-lg" id="ui-tot-carb">0</span> g</div>
        <div><span class="text-gray-500">脂肪: </span><span class="font-bold text-lg" id="ui-tot-fat">0</span> g</div>
      </div>
    </section>

    <section class="bg-white p-4 rounded-xl shadow-sm">
      <h2 class="text-lg font-bold mb-3">新增攝取</h2>
      
      <div class="mb-4">
        <div class="flex justify-between items-end mb-2">
          <span class="text-sm font-bold text-gray-600">常用快選與搜尋</span>
          <button onclick="toggleModal('editFoodModal')" class="text-xs text-blue-500 underline font-bold">🛠️ 編輯品項資料</button>
        </div>
        
        <input type="text" id="foodSearch" oninput="renderQuickSelect()" placeholder="🔍 搜尋食材 (例如: 雞、牛肉)..." class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-gray-50 focus:outline-none focus:border-blue-500 focus:bg-white text-sm mb-3 transition">
        
        <div id="quickSelectList" class="flex flex-wrap gap-2 max-h-[142px] overflow-y-auto p-2 bg-gray-50 rounded-lg border border-gray-200">
        </div>
      </div>

      <div class="space-y-3 pt-2 border-t">
        <div class="relative">
          <input type="text" id="inp-name" placeholder="食物名稱 (必填)" class="w-full border p-2 rounded bg-gray-50 font-bold" oninput="clearCurrentFoodLink()">
          <span id="link-badge" class="hidden absolute right-2 top-2.5 bg-green-100 text-green-800 text-xs px-2 py-0.5 rounded-full font-bold">已連動基準</span>
        </div>
        
        <div class="flex items-center space-x-2">
          <label class="w-24 text-sm text-gray-600 font-bold">輸入數量(g/ml/個...看得懂為主)</label>
          <input type="number" id="inp-qty" value="100" class="flex-1 border p-2 rounded font-black text-blue-600 text-lg" oninput="updateNutrientsByQty()">
        </div>
        
        <div class="flex space-x-1 justify-end">
          <button onclick="adjQty(1)" class="px-2 py-1 bg-gray-200 rounded text-xs font-bold">+1</button>
          <button onclick="adjQty(10)" class="px-2 py-1 bg-gray-200 rounded text-xs font-bold">+10</button>
          <button onclick="adjQty(50)" class="px-2 py-1 bg-gray-200 rounded text-xs font-bold">+50</button>
          <button onclick="adjQty(100)" class="px-2 py-1 bg-gray-200 rounded text-xs font-bold">+100</button>
          <button onclick="adjQty(-1)" class="px-2 py-1 bg-gray-200 rounded text-xs font-bold">-1</button>
          <button onclick="adjQty(-10)" class="px-2 py-1 bg-gray-200 rounded text-xs font-bold">-10</button>
          <button onclick="adjQty(-50)" class="px-2 py-1 bg-gray-200 rounded text-xs font-bold">-50</button>
          <button onclick="adjQty(-100)" class="px-2 py-1 bg-gray-200 rounded text-xs font-bold">-100</button>
        </div>

        <div class="grid grid-cols-2 gap-2">
          <div><span class="text-xs text-gray-400">熱量 (kcal)</span><input type="number" id="inp-cal" placeholder="未知" class="w-full border p-2 rounded text-sm" oninput="clearCurrentFoodLink()"></div>
          <div><span class="text-xs text-gray-400">蛋白質 (g)</span><input type="number" id="inp-pro" placeholder="未知" class="w-full border p-2 rounded text-sm" oninput="clearCurrentFoodLink()"></div>
          <div><span class="text-xs text-gray-400">碳水 (g)</span><input type="number" id="inp-carb" placeholder="未知" class="w-full border p-2 rounded text-sm" oninput="clearCurrentFoodLink()"></div>
          <div><span class="text-xs text-gray-400">脂肪 (g)</span><input type="number" id="inp-fat" placeholder="未知" class="w-full border p-2 rounded text-sm" oninput="clearCurrentFoodLink()"></div>
        </div>

        <div>
          <span class="text-xs text-gray-400">料理方式選擇</span>
          <select id="inp-cook" class="w-full border p-2 rounded text-sm bg-gray-50 font-bold" onchange="updateNutrientsByQty()">
            <option value="none">清蒸 / 水煮 / 原型 (不加料)</option>
            <option value="pan">油煎 / 熱炒 (每g額外: +0.4卡, +0.04g脂肪)</option>
            <option value="fry">油炸 (每g額外: +1.2卡, +0.12g脂肪)</option>
          </select>
        </div>

        <button id="btn-lock-ratio" onclick="toggleLockRatio()" class="w-full bg-gray-200 text-gray-700 border border-gray-300 font-bold py-2 rounded-lg shadow-sm hover:bg-gray-300 transition mt-2 mb-1 text-sm">
          🔓 鎖定當前營養比例
        </button>

        <button onclick="addDailyRecord()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg shadow hover:bg-blue-700 active:scale-95 transition mt-2">加入今日食譜</button>
      </div>
    </section>

    <section class="bg-white p-4 rounded-xl shadow-sm">
      <h2 class="text-lg font-bold mb-3">今日攝取清單</h2>
      <ul id="dailyList" class="space-y-2 divide-y">
        </ul>
    </section>
  </main>

  <div id="settingsModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
    <div class="bg-white p-6 rounded-xl w-11/12 max-w-sm max-h-[90vh] overflow-y-auto">
      <h2 class="text-xl font-bold mb-4">目標與體態設定</h2>
      <div class="space-y-4">
        <div class="flex justify-between items-center">
          <label>目前體重 (kg)</label>
          <div class="flex items-center space-x-2">
            <button onclick="adjSetting('set-weight', -0.1)" class="bg-gray-200 px-3 py-1 rounded font-bold">-</button>
            <input type="number" id="set-weight" class="w-16 text-center border p-1" step="0.1">
            <button onclick="adjSetting('set-weight', 0.1)" class="bg-gray-200 px-3 py-1 rounded font-bold">+</button>
          </div>
        </div>
        <div class="flex justify-between items-center">
          <label>目前體脂 (%)</label>
          <div class="flex items-center space-x-2">
            <button onclick="adjSetting('set-fat', -0.1)" class="bg-gray-200 px-3 py-1 rounded font-bold">-</button>
            <input type="number" id="set-fat" class="w-16 text-center border p-1" step="0.1">
            <button onclick="adjSetting('set-fat', 0.1)" class="bg-gray-200 px-3 py-1 rounded font-bold">+</button>
          </div>
        </div>
        <hr>
        <div class="grid grid-cols-2 gap-2 text-sm">
          <div><label>目標體重 (kg)</label><input type="number" id="set-t-weight" class="w-full border p-1 mt-1"></div>
          <div><label>目標體脂 (%)</label><input type="number" id="set-t-fat" class="w-full border p-1 mt-1"></div>
          <div><label>每日熱量上限</label><input type="number" id="set-cal-limit" class="w-full border p-1 mt-1"></div>
          <div><label>蛋白質倍數</label><input type="number" id="set-pro-mult" class="w-full border p-1 mt-1" step="0.1"></div>
        </div>
        <div class="bg-blue-50 p-3 rounded text-sm text-blue-800" id="predict-box"></div>
        <div class="flex space-x-2 mt-4">
          <button onclick="saveSettings()" class="flex-1 bg-green-600 text-white py-2 rounded font-bold">儲存紀錄</button>
          <button onclick="toggleModal('settingsModal')" class="flex-1 bg-gray-300 py-2 rounded">關閉</button>
        </div>
      </div>
    </div>
  </div>

  <div id="editFoodModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">

        if (qty <= 0) return alert('數量必須大於0才能鎖定比例！');

        // 計算並鎖定每 1 單位的營養素
        customNutritionRatio = {
          cal: (parseFloat(document.getElementById('inp-cal').value) || 0) / qty,
          pro: (parseFloat(document.getElementById('inp-pro').value) || 0) / qty,
          carb: (parseFloat(document.getElementById('inp-carb').value) || 0) / qty,
          fat: (parseFloat(document.getElementById('inp-fat').value) || 0) / qty
        };

        const btn = document.getElementById('btn-lock-ratio');
        btn.innerHTML = '🔒 已鎖定比例 (變更數量將自動換算)';
        btn.classList.replace('bg-gray-200', 'bg-green-100');
        btn.classList.replace('text-gray-700', 'text-green-800');
        btn.classList.replace('border-gray-300', 'border-green-300');

    }

    function selectFood(id) {
      unlockRatio(); // 點選快選食物時，解除手動鎖定避免衝突
      
      currentFoodLink = data.foods.find(x => x.id === id);
      if(!currentFoodLink) return;
      
      document.getElementById('inp-name').value = currentFoodLink.name;
      document.getElementById('inp-qty').value = currentFoodLink.qty; 
      document.getElementById('inp-cook').value = 'none'; 
      
      document.getElementById('link-badge').classList.remove('hidden');
      updateNutrientsByQty();
    }

    function updateNutrientsByQty() {
      const qty = parseFloat(document.getElementById('inp-qty').value) || 0;
      const cook = document.getElementById('inp-cook').value;
      
      let cal = 0, pro = 0, carb = 0, fat = 0;
      let hasRatio = false;

      // 【修正】優先判定是否有自訂鎖定比例，沒有才判定常用食物連動
      if (customNutritionRatio) {
        cal = customNutritionRatio.cal * qty;
        pro = customNutritionRatio.pro * qty;
        carb = customNutritionRatio.carb * qty;
        fat = customNutritionRatio.fat * qty;
        hasRatio = true;
      } else if (currentFoodLink) {
        const ratio = qty / currentFoodLink.qty;
        cal = currentFoodLink.cal * ratio;
        pro = currentFoodLink.pro * ratio;
        carb = currentFoodLink.carb * ratio;
        fat = currentFoodLink.fat * ratio;
        hasRatio = true;
      }

      // 如果都沒有鎖定比例，就不干涉使用者的手動輸入
      if (!hasRatio) return; 

      if (cook === 'pan') { cal += qty * 0.4;  fat += qty * 0.04; }
      if (cook === 'fry') { cal += qty * 1.2;  fat += qty * 0.12; }

      document.getElementById('inp-cal').value = cal > 0 ? cal.toFixed(1) : '';
      document.getElementById('inp-pro').value = pro > 0 ? pro.toFixed(1) : '';
      document.getElementById('inp-carb').value = carb > 0 ? carb.toFixed(1) : '';
      document.getElementById('inp-fat').value = fat > 0 ? fat.toFixed(1) : '';
    }

    function clearCurrentFoodLink() {

    }

    function addDailyRecord() {
      const name = document.getElementById('inp-name').value.trim();
      const qty = parseFloat(document.getElementById('inp-qty').value) || 0;
      const cal = parseFloat(document.getElementById('inp-cal').value) || 0;
      const pro = parseFloat(document.getElementById('inp-pro').value) || 0;
      const carb = parseFloat(document.getElementById('inp-carb').value) || 0;
      const fat = parseFloat(document.getElementById('inp-fat').value) || 0;
      const cook = document.getElementById('inp-cook').value;

      if(!name) return alert('請填寫食物名稱');

      data.daily.push({ name, qty, cal, pro, carb, fat, cook, ts: Date.now() });

      let baseCal = cal;
      let baseFat = fat;
      if (!currentFoodLink) { 
        if (cook === 'pan') { baseCal = Math.max(0, cal - qty * 0.4); baseFat = Math.max(0, fat - qty * 0.04); }
        if (cook === 'fry') { baseCal = Math.max(0, cal - qty * 1.2); baseFat = Math.max(0, fat - qty * 0.12); }
      }

      let dictFood = data.foods.find(f => f.name === name);
      if(dictFood) {
        dictFood.count++;
        dictFood.qty = qty;
        dictFood.cal = baseCal; 
        dictFood.pro = pro;
        dictFood.carb = carb;
        dictFood.fat = baseFat;
      } else {
        const maxCount = data.foods.length > 0 ? Math.max(...data.foods.map(f => f.count)) : 0;
        data.foods.push({ 
          id: Date.now().toString(), 
          name, 
          qty, 
          cal: baseCal, 
          pro, 
          carb, 
          fat: baseFat, 
          count: maxCount + 1
        });
      }

      saveData();
      renderApp();
      clearInputForm();
    }

    function calcPrediction() {
      const box = document.getElementById('predict-box');
            
            // 1. 基礎防呆：樣本數不足
            if(data.weightLogs.length < 2) {
              box.innerHTML = "💡 數據觀測中，請跨日多次點擊「儲存紀錄」以產生平均體態下降斜率。";
              return;
            }

            const first = data.weightLogs[0];
            const last = data.weightLogs[data.weightLogs.length - 1];
            const days = (last.date - first.date) / (1000 * 60 * 60 * 24);
            const roundedDays = Math.max(1, Math.round(days));

            // 2. 計算斜率
            const wDrop = (first.w - last.w) / days; // 每日體重變化
            const fDrop = (first.f - last.f) / days; // 每日體脂變化

            // 3. 樣本數警告（小於7天）
            let warning = "";
            if (days < 7) {
              warning = `<div class="text-red-600 text-xs mt-1 font-bold">⚠️ 注意：當前資料統計僅 ${roundedDays} 天，樣本過少，建議累積至 7 天以上。</div>`;
            }

            // 4. 輸出顯示與預測
            const remW = data.settings.weight - data.settings.targetWeight;
            const remF = data.settings.bodyFat - data.settings.targetFat;

            const getTargetDate = (days) => {
                const date = new Date();
                date.setDate(date.getDate() + Math.ceil(days));
                return date.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric' });
            };
            
            let html = `
              <div class="space-y-1 text-sm border-b pb-2 mb-2">
                <div>統計天數: <b>${roundedDays}</b> 天</div>
                <div>每日體重變化: <b class="${wDrop > 0 ? 'text-green-600' : 'text-red-500'}">${wDrop > 0 ? '-' : '+'}${Math.abs(wDrop).toFixed(3)} kg</b></div>
                <div>每日體脂變化: <b class="${fDrop > 0 ? 'text-green-600' : 'text-red-500'}">${fDrop > 0 ? '-' : '+'}${Math.abs(fDrop).toFixed(3)} %</b></div>
                ${warning}
              </div>
            `;

            // 體重預測 (兩行呈現)
            if (remW > 0 && wDrop > 0) {
              const daysLeft = remW / wDrop;
              html += `
                <div class="mt-3 text-blue-700">
                  <div>預計約 <b>${Math.ceil(daysLeft)}</b> 天後達成目標體重。</div>
                  <div>預計於 <b>${getTargetDate(daysLeft)}</b> 達成目標。</div>
                </div>`;
            } else if (remW <= 0) {
              html += `<div class="mt-3 text-green-700 font-bold">🎉 已達成目標體重！</div>`;
            }

            // 體脂預測 (兩行呈現)
            if (remF > 0 && fDrop > 0) {
              const daysLeft = remF / fDrop;
              html += `
                <div class="mt-3 text-purple-700">
                  <div>預計約 <b>${Math.ceil(daysLeft)}</b> 天後達成目標體脂。</div>
                  <div>預計於 <b>${getTargetDate(daysLeft)}</b> 達成目標。</div>
                </div>`;
            } else if (remF <= 0) {
              html += `<div class="mt-3 text-green-700 font-bold">🎉 已達成目標體脂！</div>`;
            }

            box.innerHTML = html;
    }

    // 初始化應用程式
    renderApp();
  </script>
</body>
</html>
